name: Proxy Tester

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Proxy Tester
        run: python main.py

      - name: Commit proxy output files
        if: hashFiles('best_proxies.json') != '' || hashFiles('best_proxies.txt') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f best_proxies.json best_proxies.txt
          git diff --cached --quiet || git commit -m "Update best proxies"
          git push
